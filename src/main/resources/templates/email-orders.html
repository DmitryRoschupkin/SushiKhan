<!DOCTYPE html>
<html   xmlns="http://www.w3.org/1999/xhtml"
        xmlns:th="http://www.thymeleaf.org"
        lang="en">
<head>
    <meta charset="UTF-8">
    <title>SushiKhan - an orders from email</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <div class="logo">
      <a th:href="/" class="logo_item">SushiKhan</a>
    </div>
    <div class="email-page">
      <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
        There is no new orders from email...
      </div>
      <div th:each="order : ${orders}" class="order-card">
        <div class="customer">
          Sender: <span th:text="${order.user != null ? order.user.username : 'Anonym'}">user@example.com</span>
        </div>
        <div>
          <strong>Order:</strong>
          <ul class="sushi-list">
            <li th:each="sushi : ${order.sushiList}" class="sushi-item">
              <span th:text="${sushi.name}">Philadelphia</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
</body>
</html>
