<!DOCTYPE html>
<html   xmlns="http://www.w3.org/1999/xhtml"
        xmlns:th="http://www.thymeleaf.org"
        lang="en">
<head>
    <meta charset="UTF-8">
    <title>SushiKhan</title>
    <link rel="stylesheet" th:href="@{styles.css}">
</head>
<body>
    <div class="logo">
        <h1 class="logo_item">SushiKhan</h1>
        <h2 class="logo_item">Available ingredients</h2>
        <h2 class="design_link"><a th:href="@{/design}" class="design_link_item">Go to Sushi Design!</a></h2>
    </div>

    <div class="list-page">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ingredient: ${ingredients}">
                <td th:text="${ingredient.id}">ID</td>
                <td th:text="${ingredient.name}">NAME</td>
                <td th:text="${ingredient.type}">TYPE</td>
                <td>
                    <button class="btn-details"
                            th:onclick="openIngredientModal([[${ingredient.id}]])">
                        Details
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="ingredientModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="closeIngredientModal()">&times;</span>
            <h2>Ingredient Details</h2>
            <div id="modalBody">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <script th:src="@{/js/ingredients-modal.js}"></script>

</body>
</html>
