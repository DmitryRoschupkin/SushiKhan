<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
        lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <title>SushiKhan</title>
</head>
<body>
<div class="home__page">
    <div class="user-menu-container">
        <button type="button" class="btn-user-menu" id="userMenuBtn">
            <span th:text="${#authentication?.name != null and #authentication?.name != 'anonymousUser'
             ? #authentication.name : 'Account'}">User</span>
            <span class="arrow">▾</span>
        </button>

        <div class="dropdown-menu" id="userMenu">
            <a th:href="@{/profile}" class="dropdown-item">Account settings</a>
            <div class="dropdown-divider"></div>

            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="dropdown-item btn-logout">Log out</button>
            </form>
        </div>
    </div>
    <main class="home__page-main">
        <div class="logo">
            <h1 class="logo_item">Welcome to SushiKhan!</h1>
        </div>
        <div class="design_link">
            <a href="/design" class="design_link_item">Make your own sushi!</a>
        </div>
    </main>
    <footer class="footer">
        <div class="footer__content">
            <span class="footer__content-logo">SushiKhan</span>
            <p class="footer__content-text">&copy; Dmitriy Rochshupkin 2026</p>
        </div>
    </footer>
</div>
<script th:src="@{/js/user-menu.js}"></script>
</body>
</html>
